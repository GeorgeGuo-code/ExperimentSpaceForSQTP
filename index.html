<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>调试后端API</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    form {
      margin-bottom: 20px;
    }
    input, button {
      padding: 10px;
      margin: 5px;
    }
    pre {
      background: #f4f4f4;
      padding: 15px;
      border-radius: 5px;
      font-size: 14px;
    }
    .result {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      background: #f9f9f9;
    }
  </style>
</head>
<body>

  <h1>调试后端 API</h1>

  <!-- 登录测试 -->
  <h3>用户登录</h3>
  <form id="loginForm">
    <label for="username">用户名:</label>
    <input type="text" id="username" name="username" required><br><br>
    
    <label for="password">密码:</label>
    <input type="password" id="password" name="password" required><br><br>
    
    <button type="submit">提交</button>
  </form>

  <!-- 注册测试 -->
  <h3>用户注册</h3>
  <form id="registerForm">
    <label for="username">用户名:</label>
    <input type="text" id="username_2" name="username" required><br><br>
    
    <label for="password">密码:</label>
    <input type="password" id="password_2" name="password" required><br><br>
    
    <button type="submit">提交</button>
  </form>

  <!-- JWT验证 -->
  <h3>JWT验证</h3>
  <form id="jwtForm">
    <label for="token">JWT Token:</label>
    <input type="text" id="token" name="token" required><br><br>
    
    <button type="submit">提交</button>
  </form>

  <div class="result">
    <h4>返回结果:</h4>
    <pre id="responseOutput">等待请求...</pre>
  </div>
<script>
    // 提交用户信息
    document.getElementById('loginForm').addEventListener('submit', function(event) {
      event.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      // 创建 POST 请求数据
      const postData = { username, password };
      fetch('http://localhost:3000/api/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(postData),
      })
      .then(response => response.json())
      .then(data => {
        document.getElementById('responseOutput').textContent = JSON.stringify(data, null, 2);
      })
      .catch(error => {
        document.getElementById('responseOutput').textContent = `错误: ${error.message}`;
      });
    });

    // 提交注册数据
    document.getElementById('registerForm').addEventListener('submit', function(event) {
      event.preventDefault();

      const username = document.getElementById('username_2').value;
      const password = document.getElementById('password_2').value;

      // 创建 POST 请求数据
      const postData = { username, password };

      fetch('http://localhost:3000/api/register', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(postData),
      })
      .then(response => response.json())
      .then(data => {
        document.getElementById('responseOutput').textContent = JSON.stringify(data, null, 2);
      })
      .catch(error => {
        document.getElementById('responseOutput').textContent = `错误: ${error.message}`;
      });
    });

    // 提交 JWT 验证
    document.getElementById('jwtForm').addEventListener('submit', function(event) {
      event.preventDefault();

      const token = document.getElementById('token').value;

      fetch('http://localhost:3000/api/verify-token', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
        },
      })
      .then(response => response.json())
      .then(data => {
        document.getElementById('responseOutput').textContent = JSON.stringify(data, null, 2);
      })
      .catch(error => {
        document.getElementById('responseOutput').textContent = `错误: ${error.message}`;
      });
    });
  </script>

</body>
</html>
